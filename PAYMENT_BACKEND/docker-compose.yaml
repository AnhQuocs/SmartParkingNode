version: '3.8'
services:
  backend:
    build: .
    container_name: payment_backend
    networks:
      - app-network
    environment:
      - SERVER_IPN_URL=https://reload-bars-parental-milan.trycloudflare.com/api/payment/momo-ipn
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy_server
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config: